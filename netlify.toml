# Netlify 部署配置（默认）
[build]
command = "npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "22"

# ───────────────────────────────────────────────
# 想换成其他托管平台？等价配置如下，无需此文件也能自动识别：
#
# Cloudflare Pages：
#   构建命令  →  npm run build
#   构建输出目录 →  dist
#   框架预设  →  Astro
#
# Vercel：
#   框架预设  →  Astro（构建命令 npm run build，输出 dist）
#   无需任何配置文件
# ───────────────────────────────────────────────
